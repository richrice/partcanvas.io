services:
  partcanvas:
    build:
      context: .
    ports:
      - "${PARTCANVAS_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PARTCANVAS_DATA_DIR: /data/models
    volumes:
      - partcanvas-models:/data/models
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

volumes:
  partcanvas-models:
